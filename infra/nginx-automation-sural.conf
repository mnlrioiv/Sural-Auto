server {
    listen 80;
    server_name automation.sural.com.ar;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name automation.sural.com.ar;
    ssl_certificate /etc/letsencrypt/live/automation.sural.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/automation.sural.com.ar/privkey.pem;
    
    # Webhook 
    location = /webhook/lead-calificacion {
        proxy_pass http://127.0.0.1:5679;
        proxy_http_version 1.1;
        proxy_set_header Host automation.sural.com.ar;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin https://sural.com.ar;
    }
    
    location / {
        proxy_pass http://127.0.0.1:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}